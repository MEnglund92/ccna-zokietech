<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ZokieTech">
<meta name="theme-color" content="#0f0f13">
<title>ZokieTech - Network Technology Study App</title>
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header>
    <div class="header-glass">
      <h1><span class="header-name-plate">Network Technology</span><span class="header-subtitle">Study App</span></h1>
      <div class="course-select-wrap">
        <select class="course-select" id="courseSelect" aria-label="Select course"></select>
      </div>
      <div class="header-divider"></div>
      <button id="themeToggle" class="theme-btn" type="button" aria-label="Toggle theme">Dark</button>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Application tabs" id="tabNav">
    <button class="tab active" data-tab="browse" role="tab" aria-selected="true" aria-controls="tab-browse">Browse</button>
    <button class="tab" data-tab="flash" role="tab" aria-selected="false" aria-controls="tab-flash">Flashcards</button>
    <button class="tab" data-tab="quiz" role="tab" aria-selected="false" aria-controls="tab-quiz">Quiz</button>
    <button class="tab" data-tab="match" role="tab" aria-selected="false" aria-controls="tab-match">Match</button>
    <button class="tab" data-tab="concepts" role="tab" aria-selected="false" aria-controls="tab-concepts">Concepts</button>
    <button class="tab" data-tab="resources" role="tab" aria-selected="false" aria-controls="tab-resources">Resources</button>
    <button class="tab" data-tab="exam" role="tab" aria-selected="false" aria-controls="tab-exam">Exam</button>
    <button class="tab" data-tab="dashboard" role="tab" aria-selected="false" aria-controls="tab-dashboard">Dashboard</button>
  </nav>

  <div class="tab-container">

    <!-- BROWSE -->
    <section class="tab-panel active" id="tab-browse" role="tabpanel">
      <input type="search" class="search-box" id="searchBox" placeholder="Search network terms..." aria-label="Search vocabulary">
      <div class="filter-row" id="filterRow" role="group" aria-label="Category filters"></div>
      <div class="count-label" id="countLabel" aria-live="polite">Showing 0 items</div>
      <div class="card-grid" id="cardGrid"></div>
    </section>

    <!-- FLASHCARDS -->
    <section class="tab-panel" id="tab-flash" role="tabpanel">
      <div class="flash-controls" role="group" aria-label="Flashcard settings">
        <label for="flashCount">Cards:</label>
        <select id="flashCount">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="25">25</option>
          <option value="0" selected>All</option>
        </select>
        <label for="flashCategory">Category:</label>
        <select id="flashCategory"></select>
        <label for="flashMode">Mode:</label>
        <select id="flashMode">
          <option value="all">All Cards</option>
          <option value="due">Due for Review</option>
          <option value="new">New Cards</option>
        </select>
        <button class="trans-btn" id="flashTransBtn" type="button">Translation</button>
      </div>
      <div class="flash-wrapper" id="flashWrapper">
        <div class="flash-progress">
          <span id="flashIdx" aria-live="polite">0</span>
          <div class="bar-wrap"><div class="bar-fill" id="flashBar" style="width:0%" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div></div>
          <span id="flashTotal">0</span>
        </div>
        <div class="flash-card" id="flashCard" tabindex="0" role="button" aria-label="Tap to flip card">
          <div class="flash-card-inner">
            <div class="flash-front">
              <div class="phrase" id="fPhrase"></div>
              <div class="category" id="fCategory"></div>
            </div>
            <div class="flash-back">
              <div class="meaning" id="fMeaning"></div>
              <div class="translation" id="fTranslation"></div>
            </div>
          </div>
        </div>
        <div class="flash-hint">Tap card to flip  Use arrow keys  0-5 to rate</div>
        <div class="flash-nav">
          <button id="prevBtn" type="button">Prev</button>
          <button id="shuffleBtn" class="shuffle-btn" type="button">Shuffle</button>
          <button id="nextBtn" type="button">Next</button>
        </div>
        <div class="sm2-ratings" id="sm2Ratings" role="group" aria-label="Rate your recall">
          <button class="sm2-btn sm2-0" data-grade="0" type="button" title="Complete blackout">0<span class="sm2-lbl">Blackout</span></button>
          <button class="sm2-btn sm2-1" data-grade="1" type="button" title="Incorrect, but familiar">1<span class="sm2-lbl">Hard</span></button>
          <button class="sm2-btn sm2-2" data-grade="2" type="button" title="Incorrect, easy recall">2<span class="sm2-lbl">Medium</span></button>
          <button class="sm2-btn sm2-3" data-grade="3" type="button" title="Correct with difficulty">3<span class="sm2-lbl">Okay</span></button>
          <button class="sm2-btn sm2-4" data-grade="4" type="button" title="Correct after hesitation">4<span class="sm2-lbl">Good</span></button>
          <button class="sm2-btn sm2-5" data-grade="5" type="button" title="Perfect recall">5<span class="sm2-lbl">Perfect</span></button>
        </div>
      </div>
    </section>

    <!-- QUIZ -->
    <section class="tab-panel" id="tab-quiz" role="tabpanel">
      <div class="quiz-controls" role="group" aria-label="Quiz settings">
        <label for="quizCount">Questions:</label>
        <select id="quizCount">
          <option value="3">3</option>
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="15">15</option>
          <option value="20" selected>20</option>
        </select>
        <label for="quizCategory">Category:</label>
        <select id="quizCategory"></select>
        <button class="trans-btn" id="quizTransBtn" type="button">Translation</button>
      </div>
      <div class="quiz-area" id="quizArea">
        <div id="quizSetup">
          <button id="quizStartBtn" class="action-btn" type="button">Start Quiz</button>
        </div>
        <div id="quizContent" style="display:none">
          <div class="quiz-progress" id="quizBar">
            <span id="quizIdx">0</span>
            <div class="bar-wrap"><div class="bar-fill" style="width:0%" role="progressbar" id="quizBarFill"></div></div>
            <span id="quizTotal">0</span>
          </div>
          <div class="quiz-question" id="qPhrase"></div>
          <div class="quiz-label" id="qLabel"></div>
          <div class="quiz-options" id="quizOptions"></div>
          <div class="quiz-msg" id="quizMsg"></div>
          <button id="quizNext" class="action-btn" type="button" style="display:none">Next</button>
          <div id="quizResult" style="display:none">
            <div class="quiz-final-score" id="finalScore"></div>
            <div class="quiz-final-pct" id="finalPct"></div>
            <div id="quizReview"></div>
            <button id="quizRestart" class="action-btn" type="button">Try Again</button>
          </div>
        </div>
      </div>
    </section>

    <!-- MATCH -->
    <section class="tab-panel" id="tab-match" role="tabpanel">
      <div class="match-controls" role="group" aria-label="Match settings">
        <label for="matchSize">Pairs:</label>
        <select id="matchSize">
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="8">8</option>
        </select>
        <label for="matchCourse">Course:</label>
        <select id="matchCourse"></select>
        <label for="matchCategory">Category:</label>
        <select id="matchCategory"></select>
        <button class="trans-btn" id="matchTransBtn" type="button">Translation</button>
      </div>
      <div class="match-area" id="matchLeft">
        <div id="matchSetup">
          <button id="matchStartBtn" class="action-btn" type="button">Start Match</button>
        </div>
        <div id="matchContent" style="display:none">
          <div class="match-timer" id="matchTimer">0:00</div>
          <div class="match-status" id="matchStatus">0 / 0 matched</div>
          <div class="match-grid" id="matchGrid"></div>
          <div class="match-msg" id="matchMsg"></div>
          <div id="matchResult" style="display:none">
            <div class="match-score" id="matchScore"></div>
            <div class="match-time" id="matchTimeResult"></div>
            <button id="matchNext" class="action-btn" type="button">New Round</button>
          </div>
        </div>
      </div>
      <div class="match-area" id="matchRight"></div>
    </section>

    <!-- CONCEPTS -->
    <section class="tab-panel" id="tab-concepts" role="tabpanel">
      <div class="concept-controls" role="group" aria-label="Concept selection">
        <label for="conceptCourse">Course:</label>
        <select id="conceptCourse"></select>
        <label for="conceptTopic">Topic:</label>
        <select id="conceptTopic">
          <option value="">Select a topic...</option>
        </select>
      </div>
      <div class="concept-content" id="conceptContent">
        <div class="empty-state">
          <div class="empty-icon">📚</div>
          <div class="empty-text">Select a course and topic to view concepts</div>
        </div>
      </div>
    </section>

    <!-- RESOURCES -->
    <section class="tab-panel" id="tab-resources" role="tabpanel">
      <input type="search" class="search-box" id="resSearchBox" placeholder="Search resources..." aria-label="Search resources">
      <div class="filter-row" id="resFilterRow" role="group" aria-label="Resource type filters"></div>
      <div class="resources-content" id="resourcesContent"></div>
    </section>

    <!-- EXAM -->
    <section class="tab-panel" id="tab-exam" role="tabpanel">
      <div id="examSetup">
        <div class="exam-controls" role="group" aria-label="Exam settings">
          <label for="examCount">Questions:</label>
          <select id="examCount">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="30">30</option>
            <option value="40">40</option>
            <option value="50">50</option>
          </select>
          <label for="examTime">Time (min):</label>
          <select id="examTime">
            <option value="15">15</option>
            <option value="30">30</option>
            <option value="45">45</option>
            <option value="60" selected>60</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>
        <button id="examStartBtn" class="action-btn" type="button">Start Exam</button>
      </div>
      <div id="examArea" style="display:none">
        <div class="exam-timer" id="examTimer">60:00</div>
        <div class="exam-bar" id="examBar">
          <span id="examIdxLabel">0 / 0</span>
          <div class="bar-wrap"><div class="bar-fill" style="width:0%" id="examBarFill" role="progressbar"></div></div>
        </div>
        <div class="exam-question">
          <div class="exam-phrase" id="examQPhrase"></div>
          <div class="exam-concept" id="examQConcept"></div>
        </div>
        <div class="exam-options" id="examOptions"></div>
        <div class="exam-msg" id="examMsg"></div>
        <div class="exam-nav">
          <button id="examPrev" class="action-btn" type="button" disabled>Prev</button>
          <span id="examPassBadge" class="exam-badge" style="display:none">Pass</span>
          <span id="examFailBadge" class="exam-badge exam-fail" style="display:none">Fail</span>
          <button id="examNext" class="action-btn" type="button">Next</button>
        </div>
        <div id="examResult" style="display:none">
          <div class="exam-final-score" id="examFinalScore"></div>
          <div class="exam-final-pct" id="examFinalPct"></div>
          <div id="examReview"></div>
          <button id="examRestart" class="action-btn" type="button">Start New</button>
        </div>
      </div>
    </section>

    <!-- DASHBOARD -->
    <section class="tab-panel" id="tab-dashboard" role="tabpanel">
      <div class="dash-header">
        <h2>Dashboard</h2>
      </div>
      <div class="dash-hero" id="dashHero"></div>
      <div class="dash-metrics" id="dashGrid"></div>
      <div class="dash-actions" id="dashActions">
        <button id="exportBtn" class="action-btn" type="button">Export Stats</button>
        <button id="importBtn" class="action-btn" type="button">Import Stats</button>
        <button id="resetBtn" class="dash-reset-btn" type="button">Reset All Data</button>
      </div>
    </section>

  </div>
</div>
<input type="file" id="importFileInput" accept=".json" style="display:none">
<script src="app.js"></script>
</body>
</html>
